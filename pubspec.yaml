name: linkvault
description: Save and organize links from any app.
publish_to: none
version: 1.2.1+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  google_fonts: ^6.2.1
  go_router: ^14.0.0
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  url_launcher: ^6.3.0
  sqflite: ^2.4.3
  path: ^1.9.1
  http: ^1.6.0
  html_unescape: ^2.0.0
  flutter_sharing_intent: ^2.0.4
  share_plus: ^12.0.0
  file_picker: ^10.0.0
  cached_network_image: ^3.4.1
  package_info_plus: ^9.0.0
  purchases_flutter: ^10.2.2
  google_mobile_ads: ^9.0.0
  tutorial_coach_mark: ^1.2.12
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  firebase_storage: ^13.4.2
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
